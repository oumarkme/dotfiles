# ASCII icons (no Nerd Font needed). Colors use ANSI names -> the terminal's
# dark palette, close to GitHub Dark on both terminals.
gui:
  nerdFontsVersion: ""
  showFileTree: true
  theme:
    activeBorderColor:    ["blue", bold]
    inactiveBorderColor:  ["black"]
    selectedLineBgColor:  ["black"]
    unstagedChangesColor: ["red"]
